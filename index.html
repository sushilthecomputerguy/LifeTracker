<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Day</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#fef5eb">
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <style>
    /* ── Custom Calendar Popup ── */
    .date-wrapper { position: relative; display: inline-block; }
    .calendar-icon { font-size: 24px; cursor: pointer; user-select: none; }
    .custom-calendar {
      display: none; position: absolute; top: 36px; right: 0; z-index: 200;
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 12px; box-shadow: 0 8px 32px rgba(0,0,0,0.18);
      padding: 14px; min-width: 260px; animation: calPop .15s ease;
    }
    .custom-calendar.open { display: block; }
    @keyframes calPop {
      from { opacity: 0; transform: scale(.95) translateY(-4px); }
      to   { opacity: 1; transform: scale(1)  translateY(0);    }
    }
    .cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .cal-month-label { font-weight: 700; font-size: 14px; color: var(--text-primary, #333); }
    .cal-nav { background: none; border: none; font-size: 22px; cursor: pointer; color: var(--text-primary, #555); line-height: 1; padding: 0 6px; border-radius: 8px; }
    .cal-nav:hover { background: var(--bg-hover); }
    .cal-weekdays { display: grid; grid-template-columns: repeat(7,1fr); text-align: center; font-size: 11px; font-weight: 600; color: var(--text-secondary, #999); margin-bottom: 6px; }
    .cal-days { display: grid; grid-template-columns: repeat(7,1fr); gap: 2px; text-align: center; }
    .cal-day { padding: 6px 2px; border-radius: 8px; font-size: 13px; cursor: pointer; transition: background .12s; border: 1px solid var(--border); }
    .cal-day:hover:not(.cal-empty):not(.cal-disabled) { background: var(--bg-hover); }
    .cal-day.cal-empty   { cursor: default; border: none; }
    .cal-day.cal-disabled{ color: var(--text-faint); cursor: default; pointer-events: none; }
    .cal-day.cal-today   { font-weight: 700; color: var(--blue); }
    .cal-day.cal-selected{ background: var(--blue); color: #fff !important; font-weight: 700; }

    /* ── Slider unset / touched states ── */
    .slider-status-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 6px; }
    .slider-label { font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 6px; transition: color 0.2s; }
    .slider-label.slider-unset { color: var(--text-faint); font-weight: 400; font-style: italic; }
    .slider-unset-icon { font-size: 13px; opacity: 0.6; }
    .slider-set-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .slider-clear-btn { background: none; border: 1px solid var(--border); border-radius: 20px; padding: 3px 10px; font-size: 11px; cursor: pointer; color: var(--text-muted); display: inline-flex; align-items: center; gap: 4px; transition: all 0.15s; white-space: nowrap; flex-shrink: 0; }
    .slider-clear-btn:hover { border-color: var(--blue); color: var(--blue); }
    .slider-wrapper-unset { opacity: 0.4; transition: opacity 0.2s; }
    .slider-wrapper-unset:hover { opacity: 0.7; }
    .slider-wrapper { transition: opacity 0.2s; }
    .slider-input-unset::-webkit-slider-thumb { background: #ccc !important; box-shadow: none !important; }
    .slider-input-unset::-moz-range-thumb    { background: #ccc !important; box-shadow: none !important; }

    .save-button-container { padding: 10px 0 100px; }
  </style>
</head>
<body>

<button class="theme-toggle" aria-label="Toggle theme">🌙</button>

<div class="container">
  <!-- Header row: date + calendar icon -->
  <div style="display:grid; grid-template-columns:1fr 60px; align-items:center;">
    <h1 id="currentDateDisplay"></h1>
    <div class="date-wrapper">
      <input type="date" id="dateInput" onchange="changeDate()" style="display:none;">
      <span class="calendar-icon" onclick="toggleCustomCalendar()">📅</span>
      <div class="custom-calendar" id="customCalendar">
        <div class="cal-header">
          <button class="cal-nav" onclick="calNavMonth(-1)">&#8249;</button>
          <span class="cal-month-label" id="calMonthLabel"></span>
          <button class="cal-nav" onclick="calNavMonth(1)">&#8250;</button>
        </div>
        <div class="cal-weekdays"><span>Su</span><span>Mo</span><span>Tu</span><span>We</span><span>Th</span><span>Fr</span><span>Sa</span></div>
        <div class="cal-days" id="calDays"></div>
      </div>
    </div>
  </div>

  <div id="trackerList"></div>

  <div class="save-button-container">
    <button class="btn-save" onclick="saveAllTrackers()">💾 Save Today's Entries</button>
    <div class="save-status" id="saveStatus"></div>
  </div>

  <div class="toast" id="toastNotification">
    <div class="toast-icon">
      <svg viewBox="0 0 16 16"><polyline points="2 8 6 12 14 4"/></svg>
    </div>
    <span id="toastMessage">Saved successfully!</span>
  </div>
</div>

<div class="bottom-navigation">
  <div><a href="trackers.html"><img src="folder-icon.svg">Tracker</a></div>
  <div><a href="report.html"><img src="report-icon.svg">Report</a></div>
  <div><a href="index.html" class="active"><img src="today-icon.svg">My Day</a></div>
  <div><a href="correlate.html"><img src="setting-icon.svg">Correlate</a></div>
</div>

<!-- Shared DB layer -->
<script src="db.js"></script>

<script>
// ── helpers ──────────────────────────────────────────────────────────────────
function getLocalDateString(date = new Date()) {
  const y = date.getFullYear();
  const m = String(date.getMonth() + 1).padStart(2, '0');
  const d = String(date.getDate()).padStart(2, '0');
  return `${y}-${m}-${d}`;
}

let currentDate = getLocalDateString();

// In-memory buffer: selections that have been touched but not yet saved
// (only used for yes/no and slider which don't live in a native input)
let tempSelections = {};

// ── INIT ──────────────────────────────────────────────────────────────────────
async function init() {
  await migrateFromLocalStorage(); // move old localStorage data to IDB
  initializeDatePicker();
  await loadTrackers();
}

function initializeDatePicker() {
  const dateInput = document.getElementById('dateInput');
  const today     = getLocalDateString();
  dateInput.value = currentDate;
  dateInput.max   = today;
  updateDateDisplay();
}

// ── DATE NAVIGATION ───────────────────────────────────────────────────────────
function updateDateDisplay() {
  const dateObj  = new Date(currentDate + 'T00:00:00');
  const options  = { weekday:'long', year:'numeric', month:'long', day:'numeric' };
  let display    = dateObj.toLocaleDateString('en-US', options);
  const today    = getLocalDateString();
  if (currentDate === today) {
    display += ' (Today)';
  } else {
    const diff = Math.ceil((new Date(today) - new Date(currentDate)) / 86400000);
    display += ` (${diff} day${diff !== 1 ? 's' : ''} ago)`;
  }
  document.getElementById('currentDateDisplay').textContent = display;
}

function changeDate() {
  const val = document.getElementById('dateInput').value;
  if (!val || val > getLocalDateString()) return;
  currentDate = val;
  updateDateDisplay();
  loadSelectionsForDate();
}

// ── Custom Calendar ───────────────────────────────────────────────────────────
let calViewYear, calViewMonth;

function toggleCustomCalendar() {
  const cal = document.getElementById('customCalendar');
  if (cal.classList.contains('open')) {
    cal.classList.remove('open');
  } else {
    const [y, m] = currentDate.split('-');
    calViewYear  = parseInt(y);
    calViewMonth = parseInt(m) - 1;
    renderCustomCalendar();
    cal.classList.add('open');
  }
}

document.addEventListener('click', (e) => {
  const wrapper = document.querySelector('.date-wrapper');
  if (wrapper && !wrapper.contains(e.target)) {
    document.getElementById('customCalendar').classList.remove('open');
  }
});

function calNavMonth(dir) {
  calViewMonth += dir;
  if (calViewMonth > 11) { calViewMonth = 0;  calViewYear++; }
  if (calViewMonth < 0)  { calViewMonth = 11; calViewYear--; }
  renderCustomCalendar();
}

function renderCustomCalendar() {
  const today  = getLocalDateString();
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('calMonthLabel').textContent = `${months[calViewMonth]} ${calViewYear}`;

  const firstDay    = new Date(calViewYear, calViewMonth, 1).getDay();
  const daysInMonth = new Date(calViewYear, calViewMonth + 1, 0).getDate();
  let html = '';
  for (let i = 0; i < firstDay; i++) html += '<div class="cal-day cal-empty"></div>';
  for (let d = 1; d <= daysInMonth; d++) {
    const ds  = `${calViewYear}-${String(calViewMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    let cls   = 'cal-day';
    if (ds === today)       cls += ' cal-today';
    if (ds === currentDate) cls += ' cal-selected';
    if (ds > today)         cls += ' cal-disabled';
    html += `<div class="${cls}" onclick="calSelectDay('${ds}')">${d}</div>`;
  }
  document.getElementById('calDays').innerHTML = html;
}

function calSelectDay(ds) {
  currentDate = ds;
  document.getElementById('dateInput').value = ds;
  updateDateDisplay();
  loadSelectionsForDate();
  document.getElementById('customCalendar').classList.remove('open');
}

// ── TRACKER RENDERING ────────────────────────────────────────────────────────
function getTypeLabel(type) {
  return { dropdown:'Dropdown', yesno:'Yes / No', numeric:'Numeric', text:'Text' }[type] || 'Dropdown';
}

async function loadTrackers() {
  const trackers    = await getAllTrackers();
  const trackerList = document.getElementById('trackerList');

  if (trackers.length === 0) {
    trackerList.innerHTML = `<div class="empty-state"><p>No trackers yet. Create one first.</p></div>`;
    return;
  }

  trackerList.innerHTML = trackers.map(t => `
    <div class="tracker-item">
      <div class="tracker-header">
        <div>
          <span class="tracker-title">${t.title}</span>
          <span class="tracker-type-badge">${getTypeLabel(t.type)}</span>
        </div>
      </div>
      ${renderTrackerInput(t)}
    </div>
  `).join('');

  await loadSelectionsForDate();
}

function renderTrackerInput(tracker) {
  const type = tracker.type || 'dropdown';

  if (type === 'dropdown') {
    const style = tracker.displayStyle || 'radio';
    if (style === 'radio') {
      return `
        <div class="radio-options" id="tracker-${tracker.id}-container">
          ${tracker.options.map((opt, idx) => `
            <div class="radio-option"
                 style="background-color:${opt.color}"
                 data-tracker-id="${tracker.id}"
                 data-value="${idx}"
                 data-type="dropdown"
                 onclick="handleRadioSelection(${tracker.id},${idx},'${opt.color}')">
              ${opt.title}
            </div>`).join('')}
        </div>`;
    }
    // slider
    return `
      <div class="slider-container">
        <div class="slider-status-row">
          <div class="slider-label slider-unset" id="slider-label-${tracker.id}">
            <span class="slider-unset-icon">○</span> Not recorded — slide to pick
          </div>
          <button class="slider-clear-btn" id="slider-clear-${tracker.id}"
                  onclick="clearSlider(${tracker.id})" style="display:none;">✕ Clear</button>
        </div>
        <div class="slider-wrapper slider-wrapper-unset" id="slider-wrapper-${tracker.id}">
          <input type="range" class="slider-input slider-input-unset"
                 id="slider-${tracker.id}"
                 min="0" max="${tracker.options.length - 1}" value="0"
                 data-tracker-id="${tracker.id}" data-type="dropdown" data-touched="false"
                 oninput="handleSliderChange(${tracker.id},this.value)"
                 style="background:linear-gradient(to right,${tracker.options.map(o=>o.color).join(',')})">
        </div>
        <div class="slider-marks">
          ${tracker.options.map((o,i) => (i===0||i===tracker.options.length-1||tracker.options.length<=5)
            ? `<div class="slider-mark">${o.title}</div>` : '<div class="slider-mark"></div>').join('')}
        </div>
      </div>`;
  }

  if (type === 'yesno') {
    return `
      <div class="yesno-buttons">
        <button class="yesno-btn" id="tracker-${tracker.id}-yes"
                onclick="handleYesNo(${tracker.id},'yes')">✅ Yes</button>
        <button class="yesno-btn" id="tracker-${tracker.id}-no"
                onclick="handleYesNo(${tracker.id},'no')">❌ No</button>
      </div>`;
  }

  if (type === 'numeric') {
    return `
      <div class="numeric-input-group">
        ${tracker.numericPrefix ? `<span class="numeric-prefix">${tracker.numericPrefix}</span>` : ''}
        <input type="number" class="numeric-input tracker-input"
               id="tracker-${tracker.id}"
               data-tracker-id="${tracker.id}" data-type="numeric"
               placeholder="Enter value…">
        ${tracker.numericSuffix ? `<span class="numeric-suffix">${tracker.numericSuffix}</span>` : ''}
      </div>`;
  }

  if (type === 'text') {
    return `
      <textarea class="tracker-input" id="tracker-${tracker.id}"
                data-tracker-id="${tracker.id}" data-type="text"
                placeholder="Write something…" rows="3"></textarea>`;
  }

  return '';
}

// ── INPUT HANDLERS ────────────────────────────────────────────────────────────
function handleRadioSelection(trackerId, index, color) {
  const container = document.getElementById(`tracker-${trackerId}-container`);
  container.querySelectorAll('.radio-option').forEach(el => el.classList.remove('selected'));
  const chosen = container.querySelector(`[data-value="${index}"]`);
  if (chosen) chosen.classList.add('selected');
  setTemp(trackerId, 'dropdown', String(index));
}

function handleYesNo(trackerId, value) {
  const yes = document.getElementById(`tracker-${trackerId}-yes`);
  const no  = document.getElementById(`tracker-${trackerId}-no`);
  yes.classList.remove('selected-yes');
  no.classList.remove('selected-no');
  if (value === 'yes') yes.classList.add('selected-yes');
  else                 no.classList.add('selected-no');
  setTemp(trackerId, 'yesno', value);
}

function handleSliderChange(trackerId, value) {
  const trackers = window._cachedTrackers || [];
  const tracker  = trackers.find(t => t.id === trackerId);
  if (!tracker) return;

  const sliderEl  = document.getElementById(`slider-${trackerId}`);
  const label     = document.getElementById(`slider-label-${trackerId}`);
  const wrapperEl = document.getElementById(`slider-wrapper-${trackerId}`);
  const clearBtn  = document.getElementById(`slider-clear-${trackerId}`);
  const option    = tracker.options[parseInt(value)];

  sliderEl.dataset.touched = 'true';
  sliderEl.classList.remove('slider-input-unset');
  wrapperEl.classList.remove('slider-wrapper-unset');
  clearBtn.style.display = 'inline-flex';

  if (option) {
    label.className   = 'slider-label';
    label.style.color = option.color;
    label.innerHTML   = `<span class="slider-set-dot" style="background:${option.color}"></span> ${option.title}`;
  }
  setTemp(trackerId, 'dropdown', String(value));
}

function clearSlider(trackerId) {
  const sliderEl  = document.getElementById(`slider-${trackerId}`);
  const label     = document.getElementById(`slider-label-${trackerId}`);
  const wrapperEl = document.getElementById(`slider-wrapper-${trackerId}`);
  const clearBtn  = document.getElementById(`slider-clear-${trackerId}`);

  sliderEl.value            = 0;
  sliderEl.dataset.touched  = 'false';
  sliderEl.classList.add('slider-input-unset');
  wrapperEl.classList.add('slider-wrapper-unset');
  clearBtn.style.display    = 'none';
  label.className           = 'slider-label slider-unset';
  label.style.color         = '';
  label.innerHTML           = '<span class="slider-unset-icon">○</span> Not recorded — slide to pick';

  deleteTemp(trackerId);
}

function setTemp(trackerId, type, rawValue) {
  if (!tempSelections[currentDate]) tempSelections[currentDate] = {};
  tempSelections[currentDate][trackerId] = { type, rawValue };
}

function deleteTemp(trackerId) {
  if (tempSelections[currentDate]) delete tempSelections[currentDate][trackerId];
}

// ── SAVE ──────────────────────────────────────────────────────────────────────
async function saveAllTrackers() {
  const saves = [];

  // numeric + text inputs (native elements)
  document.querySelectorAll('input[data-tracker-id], textarea[data-tracker-id]').forEach(el => {
    const tid   = parseInt(el.getAttribute('data-tracker-id'));
    const type  = el.getAttribute('data-type');
    const value = el.value.trim();
    if (type === 'numeric' || type === 'text') {
      if (value) saves.push(saveEntry(currentDate, tid, type, value));
      else       saves.push(deleteEntry(currentDate, tid));
    }
  });

  // temp selections (yes/no + radio + slider)
  const dayTemp = tempSelections[currentDate] || {};
  for (const [tidStr, sel] of Object.entries(dayTemp)) {
    const tid = parseInt(tidStr);
    saves.push(saveEntry(currentDate, tid, sel.type, sel.rawValue));
  }

  await Promise.all(saves);
  tempSelections = {};
  showToast('Saved successfully!');
}

// ── LOAD ──────────────────────────────────────────────────────────────────────
async function loadSelectionsForDate() {
  // reset all inputs
  document.querySelectorAll('.radio-option').forEach(el => el.classList.remove('selected'));
  document.querySelectorAll('.yesno-btn').forEach(el => el.classList.remove('selected-yes','selected-no'));
  document.querySelectorAll('input[data-tracker-id]').forEach(el => { if (el.type !== 'range') el.value = ''; });
  document.querySelectorAll('textarea[data-tracker-id]').forEach(el => el.value = '');
  // reset sliders
  document.querySelectorAll('[id^="slider-label-"]').forEach(el => {
    el.className = 'slider-label slider-unset';
    el.style.color = '';
    el.innerHTML = '<span class="slider-unset-icon">○</span> Not recorded — slide to pick';
  });
  document.querySelectorAll('input[type="range"][data-tracker-id]').forEach(el => {
    el.value = 0; el.dataset.touched = 'false'; el.classList.add('slider-input-unset');
  });
  document.querySelectorAll('[id^="slider-wrapper-"]').forEach(el => el.classList.add('slider-wrapper-unset'));
  document.querySelectorAll('[id^="slider-clear-"]').forEach(el => el.style.display = 'none');

  const trackers = await getAllTrackers();
  window._cachedTrackers = trackers;
  const entries  = await loadEntriesForDate(currentDate);
  tempSelections = {};

  for (const [tid, entry] of Object.entries(entries)) {
    const tracker = trackers.find(t => t.id == tid);
    if (!tracker) continue;
    const type  = entry.type || 'dropdown';
    const raw   = entry.rawValue;

    if (type === 'dropdown') {
      const style = tracker.displayStyle || 'radio';
      if (style === 'radio') {
        const cont = document.getElementById(`tracker-${tid}-container`);
        const opt  = cont?.querySelector(`[data-value="${raw}"]`);
        opt?.classList.add('selected');
      } else {
        const slider = document.getElementById(`slider-${tid}`);
        if (slider) {
          slider.value = raw;
          slider.dataset.touched = 'true';
          slider.classList.remove('slider-input-unset');
          document.getElementById(`slider-wrapper-${tid}`)?.classList.remove('slider-wrapper-unset');
          document.getElementById(`slider-clear-${tid}`).style.display = 'inline-flex';
          const opt = tracker.options[parseInt(raw)];
          if (opt) {
            const lbl = document.getElementById(`slider-label-${tid}`);
            lbl.className = 'slider-label';
            lbl.style.color = opt.color;
            lbl.innerHTML = `<span class="slider-set-dot" style="background:${opt.color}"></span> ${opt.title}`;
          }
        }
      }
    } else if (type === 'yesno') {
      if (raw === 'yes') document.getElementById(`tracker-${tid}-yes`)?.classList.add('selected-yes');
      else               document.getElementById(`tracker-${tid}-no`)?.classList.add('selected-no');
    } else {
      const el = document.getElementById(`tracker-${tid}`);
      if (el) el.value = raw;
    }
  }
}

// ── TOAST ─────────────────────────────────────────────────────────────────────
let toastTimer = null;
function showToast(msg) {
  const toast  = document.getElementById('toastNotification');
  document.getElementById('toastMessage').textContent = msg;
  if (toastTimer) clearTimeout(toastTimer);
  toast.classList.add('show');
  toastTimer = setTimeout(() => { toast.classList.remove('show'); toastTimer = null; }, 3000);
}

// Start
document.addEventListener('DOMContentLoaded', init);
</script>

<!-- Theme toggle -->
<script>
(function () {
  const KEY = 'theme', L = 'light', D = 'dark';
  const sys  = () => window.matchMedia('(prefers-color-scheme: dark)').matches ? D : L;
  const saved= () => localStorage.getItem(KEY);
  const apply= (t) => {
    document.documentElement.setAttribute('data-theme', t);
    document.querySelectorAll('.theme-toggle').forEach(b => {
      b.textContent = t === D ? '☀️' : '🌙';
      b.setAttribute('aria-label', t === D ? 'Switch to light mode' : 'Switch to dark mode');
    });
  };
  apply(saved() || sys());
  const toggle = () => {
    const next = (document.documentElement.getAttribute('data-theme') || sys()) === D ? L : D;
    localStorage.setItem(KEY, next); apply(next);
  };
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', () => document.body.addEventListener('click', e => { if (e.target.closest('.theme-toggle')) toggle(); }));
  } else {
    document.body.addEventListener('click', e => { if (e.target.closest('.theme-toggle')) toggle(); });
  }
  window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => { if (!saved()) apply(e.matches ? D : L); });
})();
</script>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js')
      .then(() => console.log('SW Registered'))
      .catch(err => console.log('SW failed:', err));
  });
}
</script>
</body>
