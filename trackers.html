<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Trackers</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#fef5eb">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
</head>
<body>

<div class="container">
    <h1>My Trackers</h1>
    <p class="subtitle">View and manage your custom trackers</p>

    <div class="top-bar" style="display: flex; gap: 12px; flex-wrap: wrap;">
        <button class="btn btn-primary" onclick="openAddModal()">+ Add Custom Tracker</button>
        <a href="template.html" class="btn btn-outline">Browse Templates →</a>
    </div>

    <div class="tracker-grid" id="trackerList"></div>
</div>

<div class="bottom-navigation">
    <div><a href="trackers.html"><img src="folder-icon.svg"/>Tracker</a></div>
    <div><a href="report.html"><img src="report-icon.svg"/>Report</a></div>
    <div><a href="index.html"><img src="today-icon.svg"/>My Day</a></div>
    <div><a href="settings.html"><img src="setting-icon.svg"/>Settings</a></div>
</div>

<!-- ── Modal ── -->
<div class="modal" id="trackerModal">
    <div class="modal-content">
        <div class="modal-header">
            <h2 class="modal-title" id="modalTitle">Add New Tracker</h2>
            <button class="close-btn" onclick="closeModal()" aria-label="Close">✕</button>
        </div>

        <form id="trackerForm" onsubmit="saveTracker(event)">

            <!-- Name -->
            <div class="form-group">
                <label class="form-label">Tracker Name <span class="required">*</span></label>
                <input type="text" id="trackerName" class="form-input" placeholder="e.g., Anxiety Level" required>
            </div>

            <!-- Type -->
            <div class="form-group">
                <label class="form-label">Type <span class="required">*</span></label>
                <div class="type-cards" id="typeCards">
                    <label class="type-card">
                        <input type="radio" name="trackerTypeRadio" value="dropdown" checked onchange="handleTypeChange()">
                        <span class="type-card-icon">🔘</span>
                        <span class="type-card-name">Choices</span>
                    </label>
                    <label class="type-card">
                        <input type="radio" name="trackerTypeRadio" value="yesno" onchange="handleTypeChange()">
                        <span class="type-card-icon">✅</span>
                        <span class="type-card-name">Yes / No</span>
                    </label>
                    <label class="type-card">
                        <input type="radio" name="trackerTypeRadio" value="numeric" onchange="handleTypeChange()">
                        <span class="type-card-icon">🔢</span>
                        <span class="type-card-name">Number</span>
                    </label>
                    <label class="type-card">
                        <input type="radio" name="trackerTypeRadio" value="text" onchange="handleTypeChange()">
                        <span class="type-card-icon">📝</span>
                        <span class="type-card-name">Text</span>
                    </label>
                </div>
                <!-- hidden select kept for compatibility -->
                <select id="trackerType" style="display:none;"></select>
            </div>

            <!-- ── Choices Options ── -->
            <div id="dropdownSection" class="options-section">

                <!-- Display style -->
                <div class="form-group">
                    <label class="form-label">How to show on My Day</label>
                    <div class="display-style-cards">
                        <label class="ds-card">
                            <input type="radio" id="displayRadio" name="displayStyle" value="radio" checked>
                            <span class="ds-icon">⚪</span>
                            <span>Buttons</span>
                        </label>
                        <label class="ds-card">
                            <input type="radio" id="displayDropdown" name="displayStyle" value="dropdown">
                            <span class="ds-icon">▼</span>
                            <span>Dropdown</span>
                        </label>
                        <label class="ds-card">
                            <input type="radio" id="displaySlider" name="displayStyle" value="slider">
                            <span class="ds-icon">━●━</span>
                            <span>Slider</span>
                        </label>
                    </div>
                    <div class="display-style-hint" id="sliderHint" style="display:none;">
                        💡 Order options low → high for best slider experience
                    </div>
                </div>

                <!-- Options list -->
                <div class="options-header">
                    <label class="form-label" style="margin:0;">Options</label>
                    <button type="button" class="btn-add-option" onclick="addOption()">+ Add Option</button>
                </div>
                <p class="hint-text">Give each option a name, colour and optional score.</p>
                <div id="optionsList"></div>
            </div>

            <!-- ── Yes/No ── -->
            <div id="yesnoSection" class="form-group hidden">
                <label class="form-label">Score for Analysis</label>
                <div class="two-col">
                    <div class="score-field">
                        <span class="score-label yes-label">Yes</span>
                        <input type="number" id="yesValue" class="form-input" value="1" step="any" placeholder="1">
                    </div>
                    <div class="score-field">
                        <span class="score-label no-label">No</span>
                        <input type="number" id="noValue" class="form-input" value="0" step="any" placeholder="0">
                    </div>
                </div>
            </div>

            <!-- ── Numeric Config ── -->
            <div id="numericSection" class="form-group hidden">
                <label class="form-label">Number Format</label>
                <div class="two-col">
                    <input type="text" id="numericPrefix" class="form-input" placeholder="Prefix  e.g. $">
                    <input type="text" id="numericSuffix" class="form-input" placeholder="Suffix  e.g. kg">
                </div>
            </div>

            <div class="modal-actions">
                <button type="button" class="btn btn-ghost" onclick="closeModal()">Cancel</button>
                <button type="submit" class="btn btn-success">Save Tracker</button>
            </div>
        </form>
    </div>
</div>

<!-- ── Colour Picker Overlay ── -->
<div class="cp-overlay" id="cpOverlay">
    <div class="cp-sheet">
        <div class="cp-header">
            <span class="cp-title">Pick a Colour</span>
            <button class="close-btn" onclick="closeColorPicker()" aria-label="Close">✕</button>
        </div>
        <div class="cp-swatches" id="cpSwatches"></div>
        <div class="cp-hex-row">
            <div class="cp-hex-preview" id="cpHexPreview"></div>
            <input class="cp-hex-input" id="cpHexInput" type="text" maxlength="7" placeholder="#f1c40f" spellcheck="false">
            <button class="cp-hex-apply" onclick="applyHex()">Apply</button>
        </div>
    </div>
</div>

<style>
/* ── Option rows ─────────────────────────────────────────── */
.option-row {
    display: grid;
    grid-template-columns: 1fr auto;
    grid-template-rows: auto auto;
    gap: 8px 10px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 12px 12px 12px 14px;
    margin-bottom: 10px;
    align-items: center;
}
.option-row .option-title {
    grid-column: 1;
    grid-row: 1;
    font-size: 16px;
    padding: 10px 12px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    background: var(--bg-input);
    color: var(--text-body);
    width: 100%;
    box-sizing: border-box;
}
.option-row .option-title:focus { outline: none; border-color: var(--accent); }
.option-remove-btn {
    grid-column: 2;
    grid-row: 1;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 1.5px solid var(--border);
    background: none;
    color: var(--text-muted);
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
}
.option-remove-btn:hover { border-color: #e74c3c; color: #e74c3c; }
.option-bottom-row {
    grid-column: 1 / -1;
    grid-row: 2;
    display: flex;
    align-items: center;
    gap: 10px;
}
.color-swatch-btn {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    border: 2.5px solid rgba(0,0,0,0.12);
    cursor: pointer;
    flex-shrink: 0;
    transition: transform .15s;
    position: relative;
}
.color-swatch-btn:active { transform: scale(.93); }
.color-swatch-btn::after {
    content: '✎';
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    color: rgba(255,255,255,.85);
    text-shadow: 0 1px 3px rgba(0,0,0,.4);
}
.option-numeric-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    flex: 1;
}
.option-numeric-input {
    width: 100%;
    padding: 10px 8px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-size: 15px;
    background: var(--bg-input);
    color: var(--text-body);
    text-align: center;
    box-sizing: border-box;
}
.option-numeric-input:focus { outline: none; border-color: var(--accent); }
.option-numeric-label {
    font-size: 11px;
    color: var(--text-muted);
}

/* ── Type cards ──────────────────────────────────────────── */
.type-cards {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
}
.type-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 12px 6px;
    border: 2px solid var(--border);
    border-radius: 14px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-body);
    transition: border-color .15s, background .15s;
    text-align: center;
    line-height: 1.2;
}
.type-card input[type="radio"] { display: none; }
.type-card-icon { font-size: 22px; }
.type-card:has(input:checked) {
    border-color: var(--accent, #e07b39);
    background: color-mix(in srgb, var(--accent, #e07b39) 10%, transparent);
}

/* ── Display style cards ─────────────────────────────────── */
.display-style-cards {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 8px;
}
.ds-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 10px 6px;
    border: 2px solid var(--border);
    border-radius: 12px;
    cursor: pointer;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-body);
    transition: border-color .15s, background .15s;
    text-align: center;
}
.ds-card input[type="radio"] { display: none; }
.ds-icon { font-size: 18px; }
.ds-card:has(input:checked) {
    border-color: var(--accent, #e07b39);
    background: color-mix(in srgb, var(--accent, #e07b39) 10%, transparent);
}

/* ── Options header / add btn ────────────────────────────── */
.options-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 4px;
}
.btn-add-option {
    padding: 8px 16px;
    background: var(--accent, #e07b39);
    color: #fff;
    border: none;
    border-radius: 20px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
}
.hint-text {
    font-size: 12px;
    color: var(--text-muted);
    margin: 0 0 10px;
}

/* ── Yes/No score fields ─────────────────────────────────── */
.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.score-field { display: flex; flex-direction: column; gap: 6px; }
.score-label {
    font-size: 14px;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 20px;
    display: inline-block;
    width: fit-content;
}
.yes-label { background: #d4f5e2; color: #1a7a44; }
.no-label  { background: #fde2e2; color: #a12020; }

/* ── Modal actions ───────────────────────────────────────── */
.modal-actions {
    display: flex;
    gap: 10px;
    margin-top: 24px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
}
.modal-actions .btn { flex: 1; padding: 14px; font-size: 16px; font-weight: 700; border-radius: 14px; }
.btn-ghost {
    background: none;
    border: 1.5px solid var(--border);
    color: var(--text-body);
    cursor: pointer;
}
.required { color: #e74c3c; }

/* ── Colour Picker Overlay ───────────────────────────────── */
.cp-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.45);
    z-index: 9999;
    align-items: flex-end;
    justify-content: center;
}
.cp-overlay.open { display: flex; }
.cp-sheet {
    background: var(--bg-card, #fff);
    border-radius: 24px 24px 0 0;
    padding: 20px 20px 32px;
    width: 100%;
    max-width: 480px;
    max-height: 80vh;
    overflow-y: auto;
    animation: slideUp .2s ease;
}
@keyframes slideUp {
    from { transform: translateY(40px); opacity: 0; }
    to   { transform: translateY(0);    opacity: 1; }
}
.cp-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 18px;
}
.cp-title { font-size: 18px; font-weight: 700; color: var(--text-primary); }
.cp-swatches {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 10px;
    margin-bottom: 20px;
}
.cp-swatch {
    aspect-ratio: 1;
    border-radius: 12px;
    border: 3px solid transparent;
    cursor: pointer;
    transition: transform .12s, border-color .12s;
    min-height: 44px;
}
.cp-swatch:active { transform: scale(.88); }
.cp-swatch.selected {
    border-color: #fff;
    box-shadow: 0 0 0 3px var(--accent, #e07b39);
}
.cp-hex-row {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--bg-input, #f5f5f5);
    border: 1.5px solid var(--border);
    border-radius: 14px;
    padding: 8px 10px;
}
.cp-hex-preview {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    flex-shrink: 0;
    border: 1px solid rgba(0,0,0,.1);
}
.cp-hex-input {
    flex: 1;
    border: none;
    background: none;
    font-size: 16px;
    font-family: monospace;
    color: var(--text-body);
    outline: none;
    letter-spacing: .05em;
}
.cp-hex-apply {
    padding: 8px 16px;
    background: var(--accent, #e07b39);
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
}
</style>

<script>
/* ═══ INDEXEDDB ═════════════════════════════════════════════ */
let db;
let editingId = null;
const DB_NAME = 'TrackerDB';
const DB_VERSION = 4;
const STORE_NAME = 'trackers';

function initDB() {
    const req = indexedDB.open(DB_NAME, DB_VERSION);

    req.onupgradeneeded = (e) => {
        db = e.target.result;
        if (!db.objectStoreNames.contains(STORE_NAME)) {
            db.createObjectStore(STORE_NAME, { keyPath: 'id', autoIncrement: true });
        }
        if (!db.objectStoreNames.contains('dailySelections')) {
            db.createObjectStore('dailySelections', { keyPath: 'date' });
        }
    };

    req.onsuccess = (e) => {
        db = e.target.result;
        seedDefaultTracker().then(() => loadTrackers());
    };

    req.onerror = (e) => {
        console.error('IndexedDB error:', e);
    };
}

function getAllTrackers() {
    return new Promise((res, rej) => {
        const req = db.transaction([STORE_NAME], 'readonly').objectStore(STORE_NAME).getAll();
        req.onsuccess = () => res(req.result);
        req.onerror = () => rej(req.error);
    });
}

/* ═══ DEFAULT TRACKER SEED ══════════════════════════════════ */
function seedDefaultTracker() {
    if (localStorage.getItem('defaultTrackerSeeded')) return Promise.resolve();
    const defaultTracker = {
        title: 'Rate My Day',
        type: 'dropdown',
        displayStyle: 'radio',
        createdAt: new Date().toISOString(),
        options: [
            { title: 'Excellent', color: '#27ae60', numericValue: 100 },
            { title: 'Good',      color: '#2980b9', numericValue: 80  },
            { title: 'Okay',      color: '#f1c40f', numericValue: 60  },
            { title: 'Bad',       color: '#d35400', numericValue: 40  },
            { title: 'Horrible',  color: '#c0392b', numericValue: 20  }
        ]
    };
    return new Promise((res, rej) => {
        const req = db.transaction([STORE_NAME], 'readwrite').objectStore(STORE_NAME).add(defaultTracker);
        req.onsuccess = () => { localStorage.setItem('defaultTrackerSeeded', '1'); res(); };
        req.onerror  = () => rej(req.error);
    });
}

function addTracker(tracker) {
    return new Promise((res, rej) => {
        const req = db.transaction([STORE_NAME], 'readwrite').objectStore(STORE_NAME).add(tracker);
        req.onsuccess = () => res(req.result);
        req.onerror = () => rej(req.error);
    });
}

function updateTracker(id, tracker) {
    return new Promise((res, rej) => {
        const req = db.transaction([STORE_NAME], 'readwrite').objectStore(STORE_NAME).put({ ...tracker, id });
        req.onsuccess = () => res();
        req.onerror = () => rej(req.error);
    });
}

function deleteTracker(id) {
    return new Promise((res, rej) => {
        const req = db.transaction([STORE_NAME], 'readwrite').objectStore(STORE_NAME).delete(id);
        req.onsuccess = () => res();
        req.onerror = () => rej(req.error);
    });
}

/* ═══ COLOR PALETTE ═════════════════════════════════════════ */
const COLOR_PALETTE = [
    '#e74c3c','#e67e22','#f1c40f','#2ecc71','#1abc9c',
    '#3498db','#9b59b6','#e91e63','#ff5722','#ff9800',
    '#8bc34a','#00bcd4','#673ab7','#f06292','#ff7043',
    '#ffd54f','#a5d6a7','#80deea','#90caf9','#ce93d8',
    '#b71c1c','#e65100','#f57f17','#1b5e20','#006064',
    '#0d47a1','#4a148c','#880e4f','#37474f','#795548'
];

// State for the colour picker overlay
let _cpWrapper   = null; // the .color-picker-wrapper element currently editing
let _cpSelected  = '#f1c40f';

function openColorPicker(wrapper) {
    _cpWrapper  = wrapper;
    _cpSelected = wrapper.dataset.selectedColor || '#f1c40f';

    // Build swatches
    const grid = document.getElementById('cpSwatches');
    grid.innerHTML = '';
    COLOR_PALETTE.forEach(color => {
        const s = document.createElement('div');
        s.className = 'cp-swatch' + (color === _cpSelected ? ' selected' : '');
        s.style.background = color;
        s.onclick = () => {
            grid.querySelectorAll('.cp-swatch').forEach(x => x.classList.remove('selected'));
            s.classList.add('selected');
            _cpSelected = color;
            syncHexInput(color);
        };
        grid.appendChild(s);
    });

    syncHexInput(_cpSelected);
    document.getElementById('cpOverlay').classList.add('open');
}

function syncHexInput(color) {
    document.getElementById('cpHexPreview').style.background = color;
    document.getElementById('cpHexInput').value = color;
}

function applyHex() {
    let val = document.getElementById('cpHexInput').value.trim();
    if (!val.startsWith('#')) val = '#' + val;
    if (!/^#([0-9a-fA-F]{3}|[0-9a-fA-F]{6})$/.test(val)) {
        document.getElementById('cpHexInput').style.outline = '2px solid #e74c3c';
        setTimeout(() => document.getElementById('cpHexInput').style.outline = '', 1200);
        return;
    }
    _cpSelected = val;
    syncHexInput(val);
    // deselect palette swatches if custom hex
    document.querySelectorAll('#cpSwatches .cp-swatch').forEach(s => {
        s.classList.toggle('selected', s.style.background === val || rgbToHex(s.style.background) === val.toLowerCase());
    });
}

// live preview as user types hex
document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('cpHexInput').addEventListener('input', function () {
        let val = this.value.trim();
        if (!val.startsWith('#')) val = '#' + val;
        if (/^#([0-9a-fA-F]{3}|[0-9a-fA-F]{6})$/.test(val)) {
            document.getElementById('cpHexPreview').style.background = val;
        }
    });
    document.getElementById('cpHexInput').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') { e.preventDefault(); applyHex(); }
    });
});

function rgbToHex(rgb) {
    const m = rgb.match(/\d+/g);
    if (!m) return rgb;
    return '#' + m.slice(0,3).map(n => parseInt(n).toString(16).padStart(2,'0')).join('');
}

function closeColorPicker(confirm = true) {
    if (confirm && _cpWrapper) {
        _cpWrapper.dataset.selectedColor = _cpSelected;
        _cpWrapper.querySelector('.color-swatch-btn').style.background = _cpSelected;
    }
    document.getElementById('cpOverlay').classList.remove('open');
    _cpWrapper = null;
}

// Close overlay on backdrop click
document.getElementById('cpOverlay').addEventListener('click', function(e) {
    if (e.target === this) closeColorPicker(true);
});

/* ═══ OPTIONS ═══════════════════════════════════════════════ */
function addOption(title = '', color = '#3498db', numericValue = '') {
    const list = document.getElementById('optionsList');
    const uid  = Date.now() + Math.random();

    const row = document.createElement('div');
    row.className = 'option-row';
    row.id = `option-${uid}`;

    // Name input
    const nameInput = document.createElement('input');
    nameInput.type        = 'text';
    nameInput.className   = 'option-title';
    nameInput.placeholder = 'Option name';
    nameInput.value       = title;

    // Remove button
    const removeBtn = document.createElement('button');
    removeBtn.type      = 'button';
    removeBtn.className = 'option-remove-btn';
    removeBtn.innerHTML = '×';
    removeBtn.onclick   = () => row.remove();

    // Bottom row: colour + score
    const bottomRow = document.createElement('div');
    bottomRow.className = 'option-bottom-row';

    // Colour swatch button (opens overlay)
    const cpWrapper = document.createElement('div');
    cpWrapper.className = 'color-picker-wrapper'; // keep class for saveTracker compat
    cpWrapper.dataset.selectedColor = color;

    const swatchBtn = document.createElement('button');
    swatchBtn.type      = 'button';
    swatchBtn.className = 'color-swatch-btn';
    swatchBtn.style.background = color;
    swatchBtn.title     = 'Choose colour';
    swatchBtn.setAttribute('aria-label', 'Choose colour');
    swatchBtn.onclick   = () => openColorPicker(cpWrapper);
    cpWrapper.appendChild(swatchBtn);

    // Numeric score
    const numericWrap = document.createElement('div');
    numericWrap.className = 'option-numeric-wrap';
    const numericInput = document.createElement('input');
    numericInput.type        = 'number';
    numericInput.className   = 'option-numeric-input';
    numericInput.placeholder = 'Score';
    numericInput.step        = 'any';
    numericInput.value       = numericValue !== '' ? numericValue : '';
    numericInput.title       = 'Numeric score for analysis';
    const numericLabel = document.createElement('div');
    numericLabel.className   = 'option-numeric-label';
    numericLabel.textContent = 'score';
    numericWrap.appendChild(numericInput);
    numericWrap.appendChild(numericLabel);

    bottomRow.appendChild(cpWrapper);
    bottomRow.appendChild(numericWrap);

    row.appendChild(nameInput);
    row.appendChild(removeBtn);
    row.appendChild(bottomRow);
    list.appendChild(row);
}

function removeOption(id) {
    document.getElementById(`option-${id}`)?.remove();
}

/* ═══ TYPE CHANGE ═══════════════════════════════════════════ */
function handleTypeChange() {
    // sync hidden <select> from radio cards
    const checked = document.querySelector('input[name="trackerTypeRadio"]:checked');
    const type    = checked ? checked.value : 'dropdown';
    document.getElementById('trackerType').value = type;

    document.getElementById('dropdownSection').classList.toggle('hidden', type !== 'dropdown');
    document.getElementById('numericSection') .classList.toggle('hidden', type !== 'numeric');
    document.getElementById('yesnoSection')   .classList.toggle('hidden', type !== 'yesno');
}

// Wire slider hint to display-style cards
document.addEventListener('DOMContentLoaded', () => {
    document.querySelectorAll('input[name="displayStyle"]').forEach(input => {
        input.addEventListener('change', function () {
            document.getElementById('sliderHint').style.display =
                this.value === 'slider' ? 'block' : 'none';
        });
    });
});

async function loadTrackers() {
    const trackers = await getAllTrackers();
    const list = document.getElementById('trackerList');

    if (!trackers.length) {
        list.innerHTML = `<div class="empty-state">
            <div class="icon">📊</div>
            <p>No trackers yet. Use a template above or add your own!</p>
        </div>`;
        return;
    }

    list.innerHTML = trackers.map(t => {
        const type = t.type || 'dropdown';
        let detailHTML = '';

        if (type === 'dropdown' && t.options) {
            detailHTML = t.options.map(o =>
                `<span class="option-pill" style="background:${o.color}" title="Value: ${o.numericValue ?? 'not set'}">${o.title}${o.numericValue !== undefined ? ` <small>(${o.numericValue})</small>` : ''}</span>`
            ).join('');
            const displayStyle = t.displayStyle || 'radio';
            const displayIcons = { 'radio': '⚪ Radio Buttons', 'dropdown': '▼ Dropdown', 'slider': '━━●━━ Slider' };
            detailHTML += `<div style="margin-top:8px;font-size:11px;color:#999;">Display: ${displayIcons[displayStyle]}</div>`;
        } else if (type === 'yesno') {
            const yv = t.yesValue ?? 1;
            const nv = t.noValue ?? 0;
            detailHTML = `<span style="color:#666;font-size:13px;">Yes = ${yv} | No = ${nv}</span>`;
        } else if (type === 'numeric') {
            const p = t.numericPrefix || '';
            const s = t.numericSuffix || '';
            detailHTML = `<span style="color:#666;font-size:13px;">Format: ${p}[number]${s ? ' ' + s : ''}</span>`;
        } else {
            detailHTML = '<span style="color:#666;font-size:13px;">Free text entry (not analyzable)</span>';
        }

        return `
            <div class="tracker-card">
                <div class="tracker-header">
                    <div class="tracker-title">${t.title}</div>
                    <div class="type-badge">${typeLabel(type)}</div>
                </div>
                <div class="tracker-details">${detailHTML}</div>
                <div class="tracker-meta">Created: ${new Date(t.createdAt).toLocaleDateString()}</div>
                <div class="tracker-actions">
                    <button class="btn btn-primary btn-small" onclick="openEditModal(${t.id})">Edit</button>
                    <button class="btn btn-danger btn-small" onclick="confirmDelete(${t.id}, '${t.title.replace(/'/g, "\\'")}')">Delete</button>
                </div>
            </div>`;
    }).join('');
}

/* ═══ MODAL ════════════════════════════════════════════════ */
function openAddModal() {
    editingId = null;
    document.getElementById('modalTitle').textContent = 'Add New Tracker';
    document.getElementById('trackerForm').reset();
    // reset type cards to dropdown
    document.querySelector('input[name="trackerTypeRadio"][value="dropdown"]').checked = true;
    document.getElementById('trackerType').value = 'dropdown';
    document.getElementById('optionsList').innerHTML = '';
    document.getElementById('displayRadio').checked = true;
    document.getElementById('sliderHint').style.display = 'none';
    document.getElementById('yesValue').value = '1';
    document.getElementById('noValue').value = '0';
    handleTypeChange();
    addOption();
    document.getElementById('trackerModal').classList.add('show');
}

async function openEditModal(id) {
    editingId = id;
    const trackers = await getAllTrackers();
    const tracker = trackers.find(t => t.id === id);
    if (!tracker) return;

    document.getElementById('modalTitle').textContent = 'Edit Tracker';
    document.getElementById('trackerName').value = tracker.title;
    const ttype = tracker.type || 'dropdown';
    document.getElementById('trackerType').value = ttype;
    // sync radio cards
    const radioCard = document.querySelector(`input[name="trackerTypeRadio"][value="${ttype}"]`);
    if (radioCard) radioCard.checked = true;

    if (tracker.type === 'numeric') {
        document.getElementById('numericPrefix').value = tracker.numericPrefix || '';
        document.getElementById('numericSuffix').value = tracker.numericSuffix || '';
    }

    if (tracker.type === 'yesno') {
        document.getElementById('yesValue').value = tracker.yesValue ?? 1;
        document.getElementById('noValue').value = tracker.noValue ?? 0;
    }

    handleTypeChange();

    if ((tracker.type === 'dropdown' || !tracker.type) && tracker.options) {
        document.getElementById('optionsList').innerHTML = '';
        tracker.options.forEach(o => addOption(o.title, o.color, o.numericValue));
        const displayStyle = tracker.displayStyle || 'radio';
        document.getElementById('display' + displayStyle.charAt(0).toUpperCase() + displayStyle.slice(1)).checked = true;
        document.getElementById('sliderHint').style.display = displayStyle === 'slider' ? 'block' : 'none';
    }

    document.getElementById('trackerModal').classList.add('show');
}

function closeModal() {
    document.getElementById('trackerModal').classList.remove('show');
    editingId = null;
}


/* ═══ SAVE ══════════════════════════════════════════════════ */
async function saveTracker(e) {
    e.preventDefault();

    const title = document.getElementById('trackerName').value.trim();
    const type = document.getElementById('trackerType').value;

    if (!title) return alert('Please enter a tracker name');

    const tracker = { title, type, createdAt: editingId ? undefined : new Date().toISOString() };

    // Preserve createdAt if editing
    if (editingId) {
        const all = await getAllTrackers();
        const existing = all.find(t => t.id === editingId);
        if (existing) tracker.createdAt = existing.createdAt;
    }
    if (!tracker.createdAt) tracker.createdAt = new Date().toISOString();

    if (type === 'dropdown') {
        const rows = [...document.querySelectorAll('#optionsList .option-row')];
        if (!rows.length) return alert('Add at least one option');

        const options = rows.map(row => {
            const titleInput = row.querySelector('.option-title');
            const colorPicker = row.querySelector('.color-picker-wrapper');
            const numericInput = row.querySelector('.option-numeric-input');
            const nv = numericInput.value.trim();
            return {
                title: titleInput.value.trim(),
                color: colorPicker.dataset.selectedColor,
                numericValue: nv !== '' ? parseFloat(nv) : undefined
            };
        });

        if (options.some(o => !o.title)) return alert('Fill in all option names');
        tracker.options = options;
        tracker.displayStyle = document.querySelector('input[name="displayStyle"]:checked').value;

    } else if (type === 'numeric') {
        tracker.numericPrefix = document.getElementById('numericPrefix').value.trim();
        tracker.numericSuffix = document.getElementById('numericSuffix').value.trim();

    } else if (type === 'yesno') {
        const yv = document.getElementById('yesValue').value.trim();
        const nv = document.getElementById('noValue').value.trim();
        tracker.yesValue = yv !== '' ? parseFloat(yv) : 1;
        tracker.noValue = nv !== '' ? parseFloat(nv) : 0;
    }

    if (editingId) {
        await updateTracker(editingId, tracker);
    } else {
        await addTracker(tracker);
    }

    closeModal();
    loadTrackers();
}

/* ═══ DELETE ════════════════════════════════════════════════ */
async function confirmDelete(id, title) {
    if (!confirm(`Delete "${title}"?\n\nThis will remove the tracker but keep your saved data.`)) return;
    await deleteTracker(id);
    loadTrackers();
}

/* ═══ UTILS ═════════════════════════════════════════════════ */
function typeLabel(t) {
    return { dropdown: 'Dropdown', yesno: 'Yes/No', numeric: 'Numeric', text: 'Text' }[t] || 'Dropdown';
}

/* ═══ BOOT ══════════════════════════════════════════════════ */
initDB();
</script>

<script>
(function () {
    const STORAGE_KEY = 'theme', LIGHT = 'light', DARK = 'dark';
    function getSystemTheme() { return window.matchMedia('(prefers-color-scheme: dark)').matches ? DARK : LIGHT; }
    function getSavedTheme() { return localStorage.getItem(STORAGE_KEY); }
    function resolveTheme() { return getSavedTheme() || getSystemTheme(); }
    function applyTheme(theme) {
        document.documentElement.setAttribute('data-theme', theme);
        document.querySelectorAll('.theme-toggle').forEach(btn => {
            btn.textContent = theme === DARK ? '☀️' : '🌙';
            btn.setAttribute('aria-label', theme === DARK ? 'Switch to light mode' : 'Switch to dark mode');
        });
    }
    function toggleTheme() {
        const current = document.documentElement.getAttribute('data-theme') || resolveTheme();
        const next = current === DARK ? LIGHT : DARK;
        localStorage.setItem(STORAGE_KEY, next);
        applyTheme(next);
    }
    function attachToggle() {
        document.body.addEventListener('click', function (e) { if (e.target.closest('.theme-toggle')) toggleTheme(); });
    }
    function watchSystemTheme() {
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function (e) { if (!getSavedTheme()) applyTheme(e.matches ? DARK : LIGHT); });
    }
    applyTheme(resolveTheme());
    if (document.readyState === 'loading') { document.addEventListener('DOMContentLoaded', attachToggle); } else { attachToggle(); }
    watchSystemTheme();
})();
</script>
