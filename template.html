<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quick Start Templates</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#fef5eb">
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <style>
    /* ── Search bar ── */
    .template-search { position: relative; margin-bottom: 18px; }
    .template-search input {
      width: 100%; padding: 10px 14px 10px 38px;
      border: 1px solid var(--border); border-radius: 4px; font-size: 14px;
      background: var(--bg-input); color: var(--text-body); box-sizing: border-box;
      outline: none; transition: border-color 0.15s;
    }
    .template-search input:focus { border-color: var(--blue); }
    .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); font-size: 15px; opacity: 0.45; pointer-events: none; }

    /* ── Accordion ── */
    .accordion { display: flex; flex-direction: column; gap: 10px; }
    .accordion-item { border: 2px solid var(--border-card); border-radius: 8px; overflow: hidden; background: var(--bg-card); }
    .accordion-item.open { box-shadow: var(--shadow); }
    .accordion-item.hidden { display: none; }
    .accordion-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; cursor: pointer; user-select: none; gap: 10px; }
    .accordion-header:hover { background: var(--bg-hover); }
    .accordion-meta { display: flex; align-items: center; gap: 8px; }
    .accordion-chevron { font-size: 13px; color: var(--text-faint); transition: transform 0.2s; }
    .accordion-item.open .accordion-chevron { transform: rotate(180deg); }
    .accordion-body { display: none; padding: 0 12px 14px; }
    .accordion-item.open .accordion-body { display: block; }

    /* ── Type dot ── */
    .template-type-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 4px; vertical-align: middle; }
    .dot-dropdown { background: #9C27B0; }
    .dot-yesno    { background: var(--green); }
    .dot-numeric  { background: var(--blue); }
    .dot-text     { background: var(--orange); }

    /* ── No results ── */
    .no-results { text-align: center; padding: 40px 20px; color: var(--text-faint); font-size: 14px; }
    .no-results span { font-size: 32px; display: block; margin-bottom: 10px; }

    /* ── Value badge on template buttons ── */
    .template-value-info { font-size: 10px; color: var(--text-faint); margin-top: 3px; font-style: italic; }

    .page-bottom-pad { height: 80px; }
  </style>
</head>
<body>

<button class="theme-toggle" aria-label="Toggle theme">🌙</button>

<div class="container">
  <h1>Quick Start Templates</h1>
  <p class="subtitle">Choose a template to quickly add a tracker to your day</p>

  <div class="template-search">
    <span class="search-icon">🔍</span>
    <input type="text" id="templateSearch" placeholder="Search templates…"
           oninput="filterTemplates(this.value)" autocomplete="off">
  </div>

  <div class="accordion" id="accordion"></div>

  <div class="no-results hidden" id="noResults">
    <span>🔍</span>
    No templates match "<span id="noResultsQuery"></span>"
  </div>

  <div class="page-bottom-pad"></div>
</div>

<div class="bottom-navigation">
  <div><a href="trackers.html"><img src="folder-icon.svg">Tracker</a></div>
  <div><a href="report.html"><img src="report-icon.svg">Report</a></div>
  <div><a href="index.html"><img src="today-icon.svg">My Day</a></div>
  <div><a href="correlate.html"><img src="setting-icon.svg">Correlate</a></div>
</div>

<!-- Shared DB layer -->
<script src="db.js"></script>

<script>
let ALL_CATEGORIES = [];

function typeLabel(type) {
  return { dropdown:'Dropdown', yesno:'Yes/No', numeric:'Numeric', text:'Text' }[type] || type;
}
function typeDot(type) {
  return `<span class="template-type-dot dot-${type}"></span>`;
}

/* Summarise option values for tooltip-style info */
function optionValueSummary(template) {
  if (template.type === 'dropdown' && template.options) {
    const vals = template.options.map(o => `${o.title}: ${o.value}`).join(' · ');
    return `<div class="template-value-info">Scores: ${vals}</div>`;
  }
  if (template.type === 'yesno' && template.valueMap) {
    return `<div class="template-value-info">Yes: ${template.valueMap.yes} · No: ${template.valueMap.no}</div>`;
  }
  if (template.type === 'numeric' && template.valueMap) {
    const vm = template.valueMap;
    const opt = vm.optimalMin !== undefined ? ` · Optimal: ${vm.optimalMin}–${vm.optimalMax}` : '';
    return `<div class="template-value-info">Range: ${vm.min}–${vm.max}${opt}</div>`;
  }
  return '';
}

function buildAccordion(cats) {
  const acc = document.getElementById('accordion');
  acc.innerHTML = cats.map(cat => `
    <div class="accordion-item" id="cat-${cat.id}">
      <div class="accordion-header" onclick="toggleAccordion('${cat.id}')">
        <span style="font-weight:600;font-size:15px;color:var(--text-strong)">${cat.category}</span>
        <div class="accordion-meta">
          <span style="font-size:12px;color:var(--text-faint)">${cat.templates.length} templates</span>
          <span class="accordion-chevron">▼</span>
        </div>
      </div>
      <div class="accordion-body">
        <div class="templates-grid">
          ${cat.templates.map((tpl, idx) => `
            <button class="template-btn" onclick="useTemplate('${cat.id}',${idx},this)">
              <div>${tpl.title}</div>
              <div class="template-type">${typeDot(tpl.type)}${typeLabel(tpl.type)}</div>
              ${optionValueSummary(tpl)}
            </button>`).join('')}
        </div>
      </div>
    </div>`).join('');
}

function toggleAccordion(id) {
  document.getElementById(`cat-${id}`).classList.toggle('open');
}

function filterTemplates(query) {
  const q = query.trim().toLowerCase();
  let anyVisible = false;
  ALL_CATEGORIES.forEach(cat => {
    const item = document.getElementById(`cat-${cat.id}`);
    if (!q) {
      item.classList.remove('hidden');
      anyVisible = true;
      return;
    }
    const catMatch = cat.category.toLowerCase().includes(q);
    const tplMatch = cat.templates.some(t => t.title.toLowerCase().includes(q));
    if (catMatch || tplMatch) {
      item.classList.remove('hidden');
      anyVisible = true;
    } else {
      item.classList.add('hidden');
    }
  });
  const noRes = document.getElementById('noResults');
  noRes.classList.toggle('hidden', anyVisible);
  if (!anyVisible) document.getElementById('noResultsQuery').textContent = query;
}

/* Add tracker to IndexedDB using db.js openDB() */
async function addTrackerToDB(tracker) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const req = db.transaction('trackers', 'readwrite')
                  .objectStore('trackers').add(tracker);
    req.onsuccess = () => { db.close(); resolve(req.result); };
    req.onerror   = () => { db.close(); reject(req.error);   };
  });
}

async function useTemplate(catId, tplIdx, btn) {
  const cat      = ALL_CATEGORIES.find(c => c.id === catId);
  if (!cat) return;
  const template = cat.templates[tplIdx];
  if (!template) return;

  const originalHTML = btn.innerHTML;
  btn.disabled  = true;
  btn.innerHTML = `<span>⏳ Creating…</span><div class="template-type">${typeLabel(template.type)}</div>`;

  try {
    const tracker = {
      title:     template.title,
      type:      template.type,
      category:  catId,
      createdAt: new Date().toISOString()
    };

    /* Preserve option structure exactly — scores stay in tracker definition,
       NOT in daily entries. resolveScore() in db.js reads them at query time. */
    if (template.options)           tracker.options      = template.options;
    if (template.displayStyle)      tracker.displayStyle = template.displayStyle;
    if (template.numericPrefix !== undefined) tracker.numericPrefix = template.numericPrefix;
    if (template.numericSuffix !== undefined) tracker.numericSuffix = template.numericSuffix;
    if (template.valueMap)          tracker.valueMap     = template.valueMap;

    await addTrackerToDB(tracker);
    window.location.href = 'trackers.html';
  } catch (err) {
    console.error('Failed to save tracker:', err);
    btn.disabled  = false;
    btn.innerHTML = originalHTML;
    alert(`Could not save "${template.title}".\n\nError: ${err.message || err}`);
  }
}

<!-- Theme toggle -->
<script>
(function () {
  const KEY = 'theme', L = 'light', D = 'dark';
  const sys  = () => window.matchMedia('(prefers-color-scheme: dark)').matches ? D : L;
  const saved= () => localStorage.getItem(KEY);
  const apply= (t) => {
    document.documentElement.setAttribute('data-theme', t);
    document.querySelectorAll('.theme-toggle').forEach(b => {
      b.textContent = t === D ? '☀️' : '🌙';
      b.setAttribute('aria-label', t === D ? 'Switch to light mode' : 'Switch to dark mode');
    });
  };
  apply(saved() || sys());
  const toggle = () => {
    const next = (document.documentElement.getAttribute('data-theme') || sys()) === D ? L : D;
    localStorage.setItem(KEY, next); apply(next);
  };
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', () => document.body.addEventListener('click', e => { if (e.target.closest('.theme-toggle')) toggle(); }));
  } else {
    document.body.addEventListener('click', e => { if (e.target.closest('.theme-toggle')) toggle(); });
  }
  window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => { if (!saved()) apply(e.matches ? D : L); });
})();
</script>
